<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileShare - 上传文件</title>
  <style>
    :root {
      --primary: #4F46E5; --primary-h: #4338CA;
      --bg: #F3F4F6; --card: #FFFFFF; --border: #E5E7EB;
      --text: #111827; --muted: #6B7280;
      --green: #10B981; --red: #EF4444; --r: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 40px 16px 60px;
    }
    .wrap { width: 100%; max-width: 520px; }

    header { text-align: center; margin-bottom: 32px; }
    .logo { font-size: 26px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 6px; }
    .logo span { color: var(--primary); }
    .tagline { font-size: 14px; color: var(--muted); }

    .card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r); padding: 28px; margin-bottom: 14px; }

    .dropzone {
      position: relative; border: 2px dashed var(--border);
      border-radius: var(--r); padding: 52px 20px;
      text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s; user-select: none;
    }
    .dropzone:hover, .dropzone.over { border-color: var(--primary); background: #EEF2FF; }
    .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .dz-icon { font-size: 52px; margin-bottom: 12px; line-height: 1; }
    .dz-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .dz-hint { font-size: 13px; color: var(--muted); }

    .sel-file {
      display: none; align-items: center; gap: 14px;
      padding: 14px 16px; background: #EEF2FF;
      border-radius: 10px; margin-top: 14px;
    }
    .sel-file.show { display: flex; }
    .sel-icon { font-size: 28px; flex-shrink: 0; }
    .sel-info { flex: 1; min-width: 0; }
    .sel-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sel-size { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .btn-rm { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; padding: 4px; flex-shrink: 0; }

    .btn-upload {
      display: none; width: 100%; padding: 14px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 14px;
      transition: background .15s, transform .1s;
    }
    .btn-upload.show { display: block; }
    .btn-upload:hover { background: var(--primary-h); }
    .btn-upload:active { transform: scale(.98); }
    .btn-upload:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .prog { display: none; margin-top: 14px; }
    .prog.show { display: block; }
    .prog-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--primary); width: 0%; transition: width .4s ease; border-radius: 3px; }
    .prog-label { font-size: 12px; color: var(--muted); margin-top: 6px; text-align: center; }

    .result { display: none; margin-top: 14px; }
    .result.show { display: block; }
    .result-box { background: #ECFDF5; border: 1.5px solid #6EE7B7; border-radius: 10px; padding: 18px; }
    .result-icon { font-size: 32px; text-align: center; margin-bottom: 10px; }
    .result-title { font-size: 15px; font-weight: 700; color: #065F46; margin-bottom: 12px; text-align: center; }
    .link-box { display: flex; gap: 8px; margin-bottom: 10px; }
    .link-box input {
      flex: 1; padding: 10px 12px; font-size: 12px;
      border: 1.5px solid #6EE7B7; border-radius: 8px;
      background: #fff; color: var(--text); outline: none; font-family: monospace;
    }
    .btn-cp {
      padding: 10px 16px; background: #059669; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 700; white-space: nowrap;
      transition: background .15s;
    }
    .btn-cp:hover { background: #047857; }
    .btn-view {
      display: block; width: 100%; padding: 10px;
      background: #fff; color: #059669;
      border: 1.5px solid #6EE7B7; border-radius: 8px;
      text-align: center; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: background .15s;
    }
    .btn-view:hover { background: #F0FDF4; }

    footer { text-align: center; margin-top: 24px; font-size: 12px; color: var(--muted); }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 10px 22px; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      background: var(--text); color: #fff;
      transition: transform .25s; z-index: 999; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok { background: var(--green); }
    .toast.err { background: var(--red); }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">File<span>Share</span></div>
    <div class="tagline">上传文件，即刻获取分享链接</div>
  </header>

  <div class="card">
    <div class="dropzone" id="dz">
      <input type="file" id="fileIn">
      <div class="dz-icon">&#128640;</div>
      <div class="dz-title">拖放文件到此处</div>
      <div class="dz-hint">或点击选择 &middot; 支持所有格式 &middot; 最大 50MB</div>
    </div>

    <div class="sel-file" id="selFile">
      <span class="sel-icon" id="selIcon">&#128196;</span>
      <div class="sel-info">
        <div class="sel-name" id="selName"></div>
        <div class="sel-size" id="selSize"></div>
      </div>
      <button class="btn-rm" id="rmBtn">&#10005;</button>
    </div>

    <button class="btn-upload" id="upBtn">&#128640; 立即上传</button>

    <div class="prog" id="prog">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-label" id="progLabel">上传中...</div>
    </div>

    <div class="result" id="result">
      <div class="result-box">
        <div class="result-icon">&#127881;</div>
        <div class="result-title">上传成功！链接已生成</div>
        <div class="link-box">
          <input type="text" id="resLink" readonly>
          <button class="btn-cp" id="cpBtn">复制</button>
        </div>
        <a class="btn-view" id="viewBtn" href="#" target="_blank">&#128065; 预览文件</a>
      </div>
    </div>
  </div>

  <footer>Powered by Cloudflare R2</footer>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://fileshare-r2.guoyingwei6.workers.dev';
const MAX_SIZE = 50 * 1024 * 1024;

const ICONS = {
  html:'&#127758;', htm:'&#127758;',
  doc:'&#128196;', docx:'&#128196;',
  xls:'&#128202;', xlsx:'&#128202;',
  ppt:'&#127909;', pptx:'&#127909;',
  pdf:'&#128211;',
  jpg:'&#128247;', jpeg:'&#128247;', png:'&#128247;',
  gif:'&#128247;', webp:'&#128247;', svg:'&#128247;', bmp:'&#128247;',
  txt:'&#128203;', csv:'&#128203;', md:'&#128203;', json:'&#128203;'
};

let pickedFile = null;

function ext(name) { return name.split('.').pop().toLowerCase(); }
function icon(name) { return ICONS[ext(name)] || '&#128196;'; }
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function viewUrl(fileUrl) {
  return location.origin + '/view.html?url=' + encodeURIComponent(fileUrl);
}

function pick(file) {
  if (file.size > MAX_SIZE) { toast(`文件过大，最大 ${fmtSize(MAX_SIZE)}`, 'err'); return; }
  pickedFile = file;
  document.getElementById('selIcon').innerHTML = icon(file.name);
  document.getElementById('selName').textContent = file.name;
  document.getElementById('selSize').textContent = fmtSize(file.size);
  document.getElementById('selFile').classList.add('show');
  document.getElementById('upBtn').classList.add('show');
  document.getElementById('result').classList.remove('show');
}

document.getElementById('fileIn').addEventListener('change', e => { if (e.target.files[0]) pick(e.target.files[0]); });
const dz = document.getElementById('dz');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); if (e.dataTransfer.files[0]) pick(e.dataTransfer.files[0]); });
document.getElementById('rmBtn').addEventListener('click', () => {
  pickedFile = null;
  document.getElementById('selFile').classList.remove('show');
  document.getElementById('upBtn').classList.remove('show');
  document.getElementById('fileIn').value = '';
});

document.getElementById('upBtn').addEventListener('click', async () => {
  if (!pickedFile) return;
  const btn = document.getElementById('upBtn');
  btn.disabled = true; btn.textContent = '上传中...';
  const prog = document.getElementById('prog');
  prog.classList.add('show');
  document.getElementById('progFill').style.width = '20%';
  document.getElementById('progLabel').textContent = '上传中...';

  try {
    const fd = new FormData();
    fd.append('file', pickedFile);

    const resp = await fetch(WORKER + '/upload', { method: 'POST', body: fd });
    document.getElementById('progFill').style.width = '100%';
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error || `HTTP ${resp.status}`); }
    const { url } = await resp.json();
    const vUrl = viewUrl(url);

    document.getElementById('resLink').value = vUrl;
    document.getElementById('viewBtn').href = vUrl;
    document.getElementById('result').classList.add('show');
  } catch (e) {
    toast('上传失败：' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.innerHTML = '&#128640; 再上传一个';
    setTimeout(() => { prog.classList.remove('show'); document.getElementById('progFill').style.width = '0%'; }, 800);
  }
});

document.getElementById('cpBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('resLink').value).then(() => toast('链接已复制！', 'ok'));
});

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
