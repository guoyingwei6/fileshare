<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileShare - 上传文件</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-h: #4338CA;
      --bg: #F3F4F6;
      --card: #FFFFFF;
      --border: #E5E7EB;
      --text: #111827;
      --muted: #6B7280;
      --green: #10B981;
      --red: #EF4444;
      --r: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 16px 60px;
    }

    .wrap { width: 100%; max-width: 520px; }

    header { text-align: center; margin-bottom: 32px; }
    .logo { font-size: 26px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 6px; }
    .logo span { color: var(--primary); }
    .tagline { font-size: 14px; color: var(--muted); }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 28px;
      margin-bottom: 14px;
    }

    /* Dropzone */
    .dropzone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: var(--r);
      padding: 52px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      user-select: none;
    }
    .dropzone:hover, .dropzone.over {
      border-color: var(--primary); background: #EEF2FF;
    }
    .dropzone input {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .dz-icon { font-size: 52px; margin-bottom: 12px; line-height: 1; }
    .dz-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .dz-hint { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .dz-types {
      display: flex; justify-content: center; gap: 8px;
      flex-wrap: wrap; margin-top: 14px;
    }
    .dz-type {
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      letter-spacing: .03em;
    }
    .t-html { background: #DBEAFE; color: #1E40AF; }
    .t-word { background: #E0E7FF; color: #3730A3; }
    .t-excel { background: #D1FAE5; color: #065F46; }
    .t-ppt { background: #FEF3C7; color: #92400E; }

    /* Selected file */
    .sel-file {
      display: none; align-items: center; gap: 14px;
      padding: 14px 16px; background: #EEF2FF;
      border-radius: 10px; margin-top: 14px;
    }
    .sel-file.show { display: flex; }
    .sel-icon { font-size: 28px; flex-shrink: 0; }
    .sel-info { flex: 1; min-width: 0; }
    .sel-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sel-size { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .btn-rm { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; padding: 4px; flex-shrink: 0; line-height: 1; }
    .btn-rm:hover { color: var(--red); }

    /* Upload button */
    .btn-upload {
      display: none; width: 100%; padding: 14px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 14px;
      transition: background .15s, transform .1s;
    }
    .btn-upload.show { display: block; }
    .btn-upload:hover { background: var(--primary-h); }
    .btn-upload:active { transform: scale(.98); }
    .btn-upload:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    /* Progress */
    .prog { display: none; margin-top: 14px; }
    .prog.show { display: block; }
    .prog-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--primary); width: 0%; transition: width .4s ease; border-radius: 3px; }
    .prog-label { font-size: 12px; color: var(--muted); margin-top: 6px; text-align: center; }

    /* Result */
    .result { display: none; margin-top: 14px; }
    .result.show { display: block; }
    .result-box {
      background: #ECFDF5; border: 1.5px solid #6EE7B7;
      border-radius: 10px; padding: 18px;
    }
    .result-icon { font-size: 32px; text-align: center; margin-bottom: 10px; }
    .result-title { font-size: 15px; font-weight: 700; color: #065F46; margin-bottom: 12px; text-align: center; }
    .link-box { display: flex; gap: 8px; margin-bottom: 10px; }
    .link-box input {
      flex: 1; padding: 10px 12px; font-size: 12px;
      border: 1.5px solid #6EE7B7; border-radius: 8px;
      background: #fff; color: var(--text); outline: none;
      font-family: monospace;
    }
    .btn-cp {
      padding: 10px 16px; background: #059669; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 700; white-space: nowrap;
      transition: background .15s;
    }
    .btn-cp:hover { background: #047857; }
    .btn-view {
      display: block; width: 100%; padding: 10px;
      background: #fff; color: #059669;
      border: 1.5px solid #6EE7B7; border-radius: 8px;
      text-align: center; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background .15s;
    }
    .btn-view:hover { background: #F0FDF4; }
    .result-note {
      font-size: 11px; color: #065F46; opacity: .75;
      text-align: center; margin-top: 10px;
    }

    /* Not configured */
    .not-cfg {
      text-align: center; padding: 32px 20px;
      color: var(--muted);
    }
    .not-cfg-icon { font-size: 40px; margin-bottom: 12px; }
    .not-cfg-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .not-cfg-msg { font-size: 13px; line-height: 1.6; }

    /* Footer */
    footer { text-align: center; margin-top: 24px; font-size: 12px; color: var(--muted); }
    footer a { color: var(--primary); text-decoration: none; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 10px 22px; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      background: var(--text); color: #fff;
      transition: transform .25s; z-index: 999; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok { background: var(--green); }
    .toast.err { background: var(--red); }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">File<span>Share</span></div>
    <div class="tagline">上传文件，即刻获取分享链接</div>
  </header>

  <div class="card" id="mainCard">
    <!-- 上传区域 -->
    <div class="dropzone" id="dz">
      <input type="file" id="fileIn" accept=".html,.htm,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.pdf,.jpg,.jpeg,.png,.gif,.webp,.svg,.bmp,.txt,.csv,.md,.json">
      <div class="dz-icon">&#128640;</div>
      <div class="dz-title">拖放文件到此处</div>
      <div class="dz-hint">或点击选择文件 &middot; 最大 10MB</div>
      <div class="dz-types">
        <span class="dz-type t-html">HTML</span>
        <span class="dz-type t-word">Word</span>
        <span class="dz-type t-excel">Excel</span>
        <span class="dz-type t-ppt">PPT</span>
        <span class="dz-type t-html">PDF</span>
        <span class="dz-type" style="background:#FCE7F3;color:#9D174D">图片</span>
        <span class="dz-type" style="background:#F5F3FF;color:#5B21B6">文本</span>
      </div>
    </div>

    <div class="sel-file" id="selFile">
      <span class="sel-icon" id="selIcon">&#128196;</span>
      <div class="sel-info">
        <div class="sel-name" id="selName"></div>
        <div class="sel-size" id="selSize"></div>
      </div>
      <button class="btn-rm" id="rmBtn">&#10005;</button>
    </div>

    <button class="btn-upload" id="upBtn">&#128640; 立即上传</button>

    <div class="prog" id="prog">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-label" id="progLabel">上传中...</div>
    </div>

    <div class="result" id="result">
      <div class="result-box">
        <div class="result-icon">&#127881;</div>
        <div class="result-title">上传成功！链接已生成</div>
        <div class="link-box">
          <input type="text" id="resLink" readonly>
          <button class="btn-cp" id="cpBtn">复制</button>
        </div>
        <a class="btn-view" id="viewBtn" href="#" target="_blank">&#128065; 预览文件</a>
        <div class="result-note">文件将在 1~3 分钟后通过 GitHub Pages 部署完成</div>
      </div>
    </div>
  </div>

  <footer>
    Powered by <a href="https://pages.github.com" target="_blank">GitHub Pages</a>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
const MAX_SIZE = 10 * 1024 * 1024;

// 从 URL hash 或 localStorage 读取 token（owner 通过分享链接传递）
function getToken() {
  const hash = location.hash.slice(1);
  if (hash.startsWith('ghp_') || hash.startsWith('github_pat_')) {
    localStorage.fs_upload_token = hash;
    history.replaceState(null, '', location.pathname + location.search);
  }
  return localStorage.fs_upload_token || '';
}

const ICONS = {
  html:'&#127758;', htm:'&#127758;',
  doc:'&#128196;', docx:'&#128196;',
  xls:'&#128202;', xlsx:'&#128202;',
  ppt:'&#127909;', pptx:'&#127909;',
  pdf:'&#128211;',
  jpg:'&#128247;', jpeg:'&#128247;', png:'&#128247;', gif:'&#128247;',
  webp:'&#128247;', svg:'&#128247;', bmp:'&#128247;',
  txt:'&#128203;', csv:'&#128203;', md:'&#128203;', json:'&#128203;'
};

const ALLOWED = [
  'html','htm','doc','docx','xls','xlsx','ppt','pptx',
  'pdf','jpg','jpeg','png','gif','webp','svg','bmp',
  'txt','csv','md','json'
];

let pickedFile = null;

function ext(name) { return name.split('.').pop().toLowerCase(); }
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function getOwnerRepo() {
  const h = location.hostname;
  const isGH = h.endsWith('.github.io');
  const owner = isGH ? h.replace('.github.io', '') : '';
  const parts = location.pathname.split('/').filter(Boolean);
  const repo = isGH && parts.length ? parts[0] : '';
  return { owner, repo };
}

function viewUrl(path) {
  const { owner, repo } = getOwnerRepo();
  return `https://${owner}.github.io/${repo}/view.html?file=${encodeURIComponent(path)}`;
}

function isConfigured() {
  return !!getToken();
}

if (!isConfigured()) {
  document.getElementById('mainCard').innerHTML = `
    <div class="not-cfg">
      <div class="not-cfg-icon">&#128274;</div>
      <div class="not-cfg-title">上传功能尚未配置</div>
      <div class="not-cfg-msg">
        请联系管理员配置上传 Token 后再使用此页面。<br>
        <br>
        <em>管理员：请参阅 README.md 完成配置。</em>
      </div>
    </div>
  `;
}

// ---- File pick ----
function pick(file) {
  const e = ext(file.name);
  if (!ALLOWED.includes(e)) { toast('不支持该文件类型', 'err'); return; }
  if (file.size > MAX_SIZE) { toast(`文件过大，最大 ${fmtSize(MAX_SIZE)}`, 'err'); return; }
  pickedFile = file;
  document.getElementById('selIcon').innerHTML = ICONS[e] || '&#128196;';
  document.getElementById('selName').textContent = file.name;
  document.getElementById('selSize').textContent = fmtSize(file.size);
  document.getElementById('selFile').classList.add('show');
  document.getElementById('upBtn').classList.add('show');
  document.getElementById('result').classList.remove('show');
}

document.getElementById('fileIn').addEventListener('change', e => {
  if (e.target.files[0]) pick(e.target.files[0]);
});

const dz = document.getElementById('dz');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  if (e.dataTransfer.files[0]) pick(e.dataTransfer.files[0]);
});

document.getElementById('rmBtn').addEventListener('click', () => {
  pickedFile = null;
  document.getElementById('selFile').classList.remove('show');
  document.getElementById('upBtn').classList.remove('show');
  document.getElementById('fileIn').value = '';
});

// ---- Upload ----
function b64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

document.getElementById('upBtn').addEventListener('click', async () => {
  if (!pickedFile || !isConfigured()) return;
  const { owner, repo } = getOwnerRepo();
  if (!owner || !repo) { toast('无法检测仓库信息', 'err'); return; }

  const btn = document.getElementById('upBtn');
  btn.disabled = true; btn.textContent = '上传中...';
  const prog = document.getElementById('prog');
  prog.classList.add('show');
  document.getElementById('progFill').style.width = '15%';
  document.getElementById('progLabel').textContent = '读取文件...';

  try {
    const content = await b64(pickedFile);
    document.getElementById('progFill').style.width = '50%';
    document.getElementById('progLabel').textContent = '上传到 GitHub...';

    const ts = Date.now();
    const safe = pickedFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = `files/${ts}_${safe}`;

    const resp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${getToken()}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28'
      },
      body: JSON.stringify({ message: `Upload ${pickedFile.name}`, content })
    });

    document.getElementById('progFill').style.width = '100%';
    document.getElementById('progLabel').textContent = '完成！';

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.message || `HTTP ${resp.status}`);
    }

    const url = viewUrl(path);
    document.getElementById('resLink').value = url;
    document.getElementById('viewBtn').href = url;
    document.getElementById('result').classList.add('show');

  } catch (e) {
    toast('上传失败：' + e.message, 'err');
    document.getElementById('progFill').style.width = '0%';
    document.getElementById('progLabel').textContent = '上传失败';
  } finally {
    btn.disabled = false; btn.innerHTML = '&#128640; 再上传一个';
    btn.classList.add('show');
    setTimeout(() => {
      prog.classList.remove('show');
      document.getElementById('progFill').style.width = '0%';
    }, 1000);
  }
});

document.getElementById('cpBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('resLink').value)
    .then(() => toast('链接已复制！', 'ok'));
});

// ---- Toast ----
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
