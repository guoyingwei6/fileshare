<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileShare - 上传文件</title>
  <style>
    :root {
      --primary: #4F46E5; --primary-h: #4338CA;
      --bg: #F3F4F6; --card: #FFFFFF; --border: #E5E7EB;
      --text: #111827; --muted: #6B7280;
      --green: #10B981; --red: #EF4444; --r: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 40px 16px 60px;
    }
    .wrap { width: 100%; max-width: 600px; }

    header { text-align: center; margin-bottom: 32px; }
    .logo { font-size: 26px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 6px; }
    .logo span { color: var(--primary); }
    .tagline { font-size: 14px; color: var(--muted); }

    .card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 14px; }

    /* Dropzone */
    .dropzone {
      position: relative; border: 2px dashed var(--border);
      border-radius: var(--r); padding: 44px 20px;
      text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s; user-select: none;
    }
    .dropzone:hover, .dropzone.over { border-color: var(--primary); background: #EEF2FF; }
    .dropzone.over { border-style: solid; }
    .dz-icon { font-size: 48px; margin-bottom: 10px; line-height: 1; }
    .dz-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .dz-hint { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .dz-actions { display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
    .dz-btn {
      padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .dz-btn-primary { background: var(--primary); color: #fff; border: none; }
    .dz-btn-primary:hover { background: var(--primary-h); }
    .dz-btn-secondary { background: #fff; color: var(--text); border: 1.5px solid var(--border); }
    .dz-btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
    #fileIn, #folderIn { display: none; }

    /* Toolbar */
    .toolbar {
      display: none; align-items: center; gap: 10px;
      margin-top: 16px; flex-wrap: wrap;
    }
    .toolbar.show { display: flex; }
    .toolbar-info { font-size: 13px; color: var(--muted); flex: 1; }
    .toolbar-info strong { color: var(--text); }
    .btn-sm {
      padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border); background: #fff;
      color: var(--text); transition: all .15s; white-space: nowrap;
    }
    .btn-sm:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

    /* File list */
    .file-list { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: #F9FAFB;
      border: 1.5px solid var(--border); border-radius: 10px;
      transition: border-color .2s;
    }
    .file-item.uploading { border-color: var(--primary); background: #EEF2FF; }
    .file-item.done { border-color: #6EE7B7; background: #F0FDF4; }
    .file-item.error { border-color: #FCA5A5; background: #FEF2F2; }
    .fi-icon { font-size: 24px; flex-shrink: 0; line-height: 1; }
    .fi-info { flex: 1; min-width: 0; }
    .fi-name {
      font-size: 13px; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .fi-path { font-size: 11px; color: var(--muted); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fi-meta { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
    .fi-size { font-size: 11px; color: var(--muted); }
    .fi-status { font-size: 11px; font-weight: 600; }
    .fi-status.uploading { color: var(--primary); }
    .fi-status.done { color: #059669; }
    .fi-status.error { color: var(--red); }
    .fi-link {
      font-size: 11px; color: var(--primary); text-decoration: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; max-width: 100%;
    }
    .fi-link:hover { text-decoration: underline; }
    .fi-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .fi-cp {
      padding: 4px 10px; background: #059669; color: #fff;
      border: none; border-radius: 6px; font-size: 11px; font-weight: 700;
      cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .fi-cp:hover { background: #047857; }
    .fi-rm {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 16px; padding: 2px 4px;
      line-height: 1; transition: color .15s;
    }
    .fi-rm:hover { color: var(--red); }

    /* Progress */
    .prog { display: none; margin-top: 14px; }
    .prog.show { display: block; }
    .prog-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--primary); width: 0%; transition: width .3s ease; border-radius: 3px; }
    .prog-label { font-size: 12px; color: var(--muted); margin-top: 6px; text-align: center; }

    /* Upload button */
    .btn-upload {
      display: none; width: 100%; padding: 14px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 14px;
      transition: background .15s, transform .1s;
    }
    .btn-upload.show { display: block; }
    .btn-upload:hover { background: var(--primary-h); }
    .btn-upload:active { transform: scale(.98); }
    .btn-upload:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    footer { text-align: center; margin-top: 24px; font-size: 12px; color: var(--muted); }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 10px 22px; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      background: var(--text); color: #fff;
      transition: transform .25s; z-index: 999; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok { background: var(--green); }
    .toast.err { background: var(--red); }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">File<span>Share</span></div>
    <div class="tagline">上传文件，即刻获取分享链接</div>
  </header>

  <div class="card">
    <div class="dropzone" id="dz">
      <div class="dz-icon">&#128640;</div>
      <div class="dz-title">拖放文件或文件夹到此处</div>
      <div class="dz-hint">支持多文件同时上传 &middot; 支持文件夹 &middot; 单文件最大 50MB</div>
      <div class="dz-actions">
        <button class="dz-btn dz-btn-primary" id="pickFilesBtn">&#128196; 选择文件</button>
        <button class="dz-btn dz-btn-secondary" id="pickFolderBtn">&#128193; 选择文件夹</button>
      </div>
    </div>
    <input type="file" id="fileIn" multiple>
    <input type="file" id="folderIn" webkitdirectory>

    <div class="toolbar" id="toolbar">
      <span class="toolbar-info" id="toolbarInfo"></span>
      <button class="btn-sm" id="addFilesBtn">+ 文件</button>
      <button class="btn-sm" id="addFolderBtn">+ 文件夹</button>
      <button class="btn-sm danger" id="clearBtn">清空</button>
    </div>

    <div class="file-list" id="fileList"></div>

    <button class="btn-upload" id="upBtn">&#128640; 开始上传</button>

    <div class="prog" id="prog">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-label" id="progLabel"></div>
    </div>
  </div>

  <footer>Powered by Cloudflare R2</footer>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://fileshare-r2.guoyingwei6.workers.dev';
const MAX_SIZE = 50 * 1024 * 1024;

const ICONS = {
  html:'&#127758;', htm:'&#127758;',
  doc:'&#128196;', docx:'&#128196;',
  xls:'&#128202;', xlsx:'&#128202;',
  ppt:'&#127909;', pptx:'&#127909;',
  pdf:'&#128211;',
  jpg:'&#128247;', jpeg:'&#128247;', png:'&#128247;',
  gif:'&#128247;', webp:'&#128247;', svg:'&#128247;', bmp:'&#128247;',
  txt:'&#128203;', csv:'&#128203;', md:'&#128203;', json:'&#128203;',
  zip:'&#128230;', gz:'&#128230;', rar:'&#128230;', '7z':'&#128230;',
  mp4:'&#127916;', mov:'&#127916;', avi:'&#127916;',
  mp3:'&#127925;', wav:'&#127925;', flac:'&#127925;',
};

function ext(name) { return name.split('.').pop().toLowerCase(); }
function icon(name) { return ICONS[ext(name)] || '&#128196;'; }
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}
function viewUrl(fileUrl) {
  return location.origin + '/view.html?url=' + encodeURIComponent(fileUrl);
}

// ---- File queue ----
let queue = [], uploading = false, idSeq = 0;
const folderGroups = {};

function addFiles(files) {
  for (const f of files) {
    if (f.size > MAX_SIZE) { toast(`"${f.name}" 超过 50MB 限制，已跳过`, 'err'); continue; }
    const id = ++idSeq;
    queue.push({ file: f, path: f.name, id, status: 'pending' });
    renderItem(queue[queue.length - 1]);
  }
  updateToolbar();
}

function addFolderFiles(files, folderKey, folderName) {
  if (!folderGroups[folderKey]) {
    folderGroups[folderKey] = { name: folderName, ids: new Set() };
    renderFolderHeader(folderKey, folderName, files.length);
  }
  for (const { file, filePath } of files) {
    if (file.size > MAX_SIZE) { toast(`"${file.name}" 超过 50MB，已跳过`, 'err'); continue; }
    const id = ++idSeq;
    folderGroups[folderKey].ids.add(id);
    queue.push({ file, path: filePath, id, status: 'pending', folderKey, filePath });
    renderItem(queue[queue.length - 1], true);
  }
  updateToolbar();
}

async function readDirEntry(entry, prefix = '') {
  const results = [];
  if (entry.isFile) {
    const file = await new Promise(res => entry.file(res));
    results.push({ file, filePath: prefix + file.name });
  } else if (entry.isDirectory) {
    const reader = entry.createReader();
    let batch, entries = [];
    do { batch = await new Promise((res, rej) => reader.readEntries(res, rej)); entries.push(...batch); } while (batch.length > 0);
    for (const child of entries) results.push(...await readDirEntry(child, prefix + entry.name + '/'));
  }
  return results;
}

async function addFromDataTransfer(dt) {
  const items = [...dt.items].filter(i => i.kind === 'file');
  const entries = items.map(i => i.webkitGetAsEntry?.()).filter(Boolean);
  if (!entries.length) { addFiles([...dt.files]); return; }
  for (const entry of entries) {
    if (entry.isDirectory) {
      const folderKey = `${Date.now()}_${entry.name}`;
      const files = await readDirEntry(entry);
      addFolderFiles(files, folderKey, entry.name);
    } else {
      const file = await new Promise(res => entry.file(res));
      addFiles([file]);
    }
  }
}

// ---- Render ----
function renderFolderHeader(folderKey, folderName, count) {
  const el = document.createElement('div');
  el.id = 'fh-' + folderKey;
  el.style.cssText = 'padding:10px 14px;background:#EEF2FF;border:1.5px solid #C7D2FE;border-radius:10px;margin-bottom:4px;';
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:22px">&#128193;</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:700;color:#4338CA;">${folderName}</div>
        <div style="font-size:12px;color:#6B7280;">${count} 个文件</div>
      </div>
      <div id="fha-${folderKey}"></div>
    </div>`;
  document.getElementById('fileList').appendChild(el);
}

function updateFolderStatus(folderKey) {
  const items = queue.filter(i => i.folderKey === folderKey);
  if (items.some(i => i.status !== 'done' && i.status !== 'error')) return;
  const folderUrl = location.origin + '/folder.html?key=' + encodeURIComponent(folderKey);
  const ac = document.getElementById('fha-' + folderKey);
  if (ac) ac.innerHTML = `<button style="padding:5px 12px;background:#4F46E5;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;" onclick="copyLink('${folderUrl}')">复制文件夹链接</button>`;
}

function renderItem(item, inFolder = false) {
  const el = document.createElement('div');
  el.className = 'file-item'; el.id = 'fi-' + item.id;
  if (inFolder) el.style.marginLeft = '16px';
  const dir = inFolder && item.filePath.includes('/') ? item.filePath.slice(0, item.filePath.lastIndexOf('/') + 1) : '';
  el.innerHTML = `
    <span class="fi-icon">${icon(item.file.name)}</span>
    <div class="fi-info">
      ${dir ? `<div class="fi-path">&#128193; ${dir}</div>` : ''}
      <div class="fi-name">${item.file.name}</div>
      <div class="fi-meta">
        <span class="fi-size">${fmtSize(item.file.size)}</span>
        <span class="fi-status" id="fis-${item.id}"></span>
      </div>
      <div id="fil-${item.id}"></div>
    </div>
    <div class="fi-actions" id="fia-${item.id}">
      ${item.folderKey ? '' : `<button class="fi-rm" title="移除" onclick="removeItem(${item.id})">&#10005;</button>`}
    </div>`;
  document.getElementById('fileList').appendChild(el);
}

function updateItemStatus(item) {
  const el = document.getElementById('fi-' + item.id); if (!el) return;
  el.className = 'file-item ' + (item.status === 'pending' ? '' : item.status);
  const st = document.getElementById('fis-' + item.id);
  const lk = document.getElementById('fil-' + item.id);
  const ac = document.getElementById('fia-' + item.id);
  if (item.status === 'uploading') {
    st.className = 'fi-status uploading'; st.textContent = '上传中...';
    lk.innerHTML = ''; if (ac) ac.innerHTML = '';
  } else if (item.status === 'done') {
    st.className = 'fi-status done'; st.textContent = '&#10003; 完成';
    if (!item.folderKey) {
      const vUrl = viewUrl(item.url);
      lk.innerHTML = `<a class="fi-link" href="${vUrl}" target="_blank">${vUrl}</a>`;
      if (ac) ac.innerHTML = `<button class="fi-cp" onclick="copyLink('${vUrl}')">复制</button>`;
    } else {
      lk.innerHTML = ''; updateFolderStatus(item.folderKey);
    }
  } else if (item.status === 'error') {
    st.className = 'fi-status error'; st.textContent = '&#10005; ' + (item.error || '失败');
    lk.innerHTML = ''; if (ac) ac.innerHTML = `<button class="fi-rm" onclick="removeItem(${item.id})">&#10005;</button>`;
  }
}

function removeItem(id) {
  queue = queue.filter(i => i.id !== id);
  document.getElementById('fi-' + id)?.remove();
  updateToolbar();
}

function updateToolbar() {
  const pending = queue.filter(i => i.status === 'pending');
  const total = queue.length;
  const toolbar = document.getElementById('toolbar');
  const upBtn = document.getElementById('upBtn');
  if (total === 0) {
    toolbar.classList.remove('show');
    upBtn.classList.remove('show');
    return;
  }
  toolbar.classList.add('show');
  const totalSize = queue.reduce((s, i) => s + i.file.size, 0);
  document.getElementById('toolbarInfo').innerHTML =
    `已选 <strong>${total}</strong> 个文件，共 <strong>${fmtSize(totalSize)}</strong>`;
  upBtn.classList.toggle('show', pending.length > 0 && !uploading);
  upBtn.textContent = `\u{1F680} 上传 ${pending.length} 个文件`;
}

// ---- Upload ----
async function uploadAll() {
  const pending = queue.filter(i => i.status === 'pending');
  if (!pending.length) return;
  uploading = true;
  document.getElementById('upBtn').disabled = true;
  document.getElementById('upBtn').classList.remove('show');

  const prog = document.getElementById('prog');
  const fill = document.getElementById('progFill');
  const label = document.getElementById('progLabel');
  prog.classList.add('show');
  fill.style.width = '0%';

  let done = 0;
  for (const item of pending) {
    label.textContent = `正在上传 ${done + 1} / ${pending.length}：${item.file.name}`;
    item.status = 'uploading';
    updateItemStatus(item);

    try {
      const fd = new FormData();
      fd.append('file', item.file);
      if (item.folderKey) {
        fd.append('folderKey', item.folderKey);
        fd.append('filePath', item.filePath);
      }
      const resp = await fetch(WORKER + '/upload', { method: 'POST', body: fd });
      if (!resp.ok) { const e = await resp.json(); throw new Error(e.error || `HTTP ${resp.status}`); }
      const { url } = await resp.json();
      item.status = 'done';
      item.url = url;
    } catch (e) {
      item.status = 'error';
      item.error = e.message;
    }

    updateItemStatus(item);
    done++;
    fill.style.width = (done / pending.length * 100) + '%';
  }

  label.textContent = `完成 ${done} / ${pending.length} 个文件`;
  const successCount = pending.filter(i => i.status === 'done').length;
  if (successCount === pending.length) {
    toast(`全部上传成功！共 ${successCount} 个文件`, 'ok');
  } else {
    toast(`上传完成：${successCount} 成功，${pending.length - successCount} 失败`, '');
  }

  uploading = false;
  setTimeout(() => { prog.classList.remove('show'); fill.style.width = '0%'; }, 1500);
  updateToolbar();
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => toast('链接已复制！', 'ok'));
}

// ---- Events ----
document.getElementById('pickFilesBtn').onclick = e => { e.stopPropagation(); document.getElementById('fileIn').click(); };
document.getElementById('pickFolderBtn').onclick = e => { e.stopPropagation(); document.getElementById('folderIn').click(); };
document.getElementById('addFilesBtn').onclick = () => document.getElementById('fileIn').click();
document.getElementById('addFolderBtn').onclick = () => document.getElementById('folderIn').click();

document.getElementById('fileIn').onchange = e => { addFiles([...e.target.files]); e.target.value = ''; };
document.getElementById('folderIn').onchange = e => {
  const files = [...e.target.files];
  if (!files.length) { e.target.value = ''; return; }
  const rootName = files[0].webkitRelativePath.split('/')[0];
  const folderKey = `${Date.now()}_${rootName}`;
  const mapped = files.map(f => ({ file: f, filePath: f.webkitRelativePath.slice(rootName.length + 1) }));
  addFolderFiles(mapped, folderKey, rootName);
  e.target.value = '';
};

document.getElementById('clearBtn').onclick = () => {
  queue = [];
  document.getElementById('fileList').innerHTML = '';
  updateToolbar();
};

document.getElementById('upBtn').onclick = uploadAll;

// Drag & drop
const dz = document.getElementById('dz');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', e => { if (!dz.contains(e.relatedTarget)) dz.classList.remove('over'); });
dz.addEventListener('drop', async e => {
  e.preventDefault(); dz.classList.remove('over');
  await addFromDataTransfer(e.dataTransfer);
});

// Also support dropping on the whole card
document.querySelector('.card').addEventListener('dragover', e => e.preventDefault());
document.querySelector('.card').addEventListener('drop', async e => {
  e.preventDefault();
  await addFromDataTransfer(e.dataTransfer);
});

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
