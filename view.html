<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件查看 - FileShare</title>
  <style>
    :root {
      --primary: #4F46E5;
      --bg: #F3F4F6;
      --card: #FFFFFF;
      --border: #E5E7EB;
      --text: #111827;
      --muted: #6B7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
    }

    /* Top bar */
    .bar {
      background: var(--card); border-bottom: 1.5px solid var(--border);
      height: 52px; padding: 0 14px;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; min-width: 0;
    }
    .bar-logo {
      font-size: 15px; font-weight: 800; color: var(--text);
      text-decoration: none; letter-spacing: -.3px; flex-shrink: 0;
    }
    .bar-logo span { color: var(--primary); }
    .bar-div { color: var(--border); flex-shrink: 0; }
    .bar-name {
      font-size: 14px; font-weight: 500; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .badge {
      font-size: 11px; font-weight: 700; padding: 3px 8px;
      border-radius: 4px; flex-shrink: 0; letter-spacing: .03em;
    }
    .b-html  { background: #DBEAFE; color: #1E40AF; }
    .b-word  { background: #E0E7FF; color: #3730A3; }
    .b-excel { background: #D1FAE5; color: #065F46; }
    .b-ppt   { background: #FEF3C7; color: #92400E; }
    .b-img   { background: #FCE7F3; color: #9D174D; }
    .b-pdf   { background: #FEE2E2; color: #991B1B; }
    .b-txt   { background: #F5F3FF; color: #5B21B6; }
    .b-other { background: var(--bg); color: var(--muted); }

    .bar-actions { display: flex; gap: 7px; flex-shrink: 0; }
    .btn-bar {
      padding: 6px 13px; border-radius: 7px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      text-decoration: none; display: flex; align-items: center; gap: 4px;
      border: none; transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .btn-dl { background: var(--primary); color: #fff; }
    .btn-dl:hover { background: #4338CA; }
    .btn-up { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
    .btn-up:hover { border-color: var(--primary); color: var(--primary); }

    /* Viewer */
    .viewer { flex: 1; position: relative; overflow: hidden; }
    .viewer iframe { width: 100%; height: 100%; border: none; display: block; }

    /* Image viewer */
    .img-wrap {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: #111827; overflow: auto; padding: 20px;
    }
    .img-wrap img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
    }

    /* Text viewer */
    .text-wrap {
      width: 100%; height: 100%;
      overflow: auto; background: #fff;
    }
    .text-inner {
      max-width: 860px; margin: 0 auto;
      padding: 28px 32px;
    }
    .text-inner pre {
      font-family: 'SF Mono', 'Fira Code', Consolas, 'Courier New', monospace;
      font-size: 13.5px; line-height: 1.7;
      color: var(--text); white-space: pre-wrap; word-break: break-word;
    }

    /* State overlay */
    .state {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: var(--bg);
    }
    .state-icon { font-size: 52px; }
    .state-msg { font-size: 16px; font-weight: 600; }
    .state-sub { font-size: 13px; color: var(--muted); text-align: center; max-width: 300px; line-height: 1.6; }
    .state-retry {
      margin-top: 6px; padding: 8px 22px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .state-retry:hover { background: #4338CA; }
  </style>
</head>
<body>
  <div class="bar">
    <a class="bar-logo" id="homeLink" href="#">File<span>Share</span></a>
    <span class="bar-div">/</span>
    <span class="bar-name" id="barName">加载中...</span>
    <span class="badge" id="barBadge"></span>
    <div class="bar-actions">
      <a class="btn-bar btn-dl" id="dlBtn" href="#">&#8595; 下载</a>
      <a class="btn-bar btn-up" id="upLink" href="#">&#8593; 上传</a>
    </div>
  </div>

  <div class="viewer" id="viewer">
    <div class="state" id="stateEl">
      <div class="state-icon">&#128203;</div>
      <div class="state-msg">正在加载...</div>
    </div>
  </div>

<script>
const EXT_MAP = {
  // HTML
  html: { label:'HTML',  badge:'b-html',  type:'html'   },
  htm:  { label:'HTML',  badge:'b-html',  type:'html'   },
  // Office
  doc:  { label:'Word',  badge:'b-word',  type:'office' },
  docx: { label:'Word',  badge:'b-word',  type:'office' },
  xls:  { label:'Excel', badge:'b-excel', type:'office' },
  xlsx: { label:'Excel', badge:'b-excel', type:'office' },
  ppt:  { label:'PPT',   badge:'b-ppt',   type:'office' },
  pptx: { label:'PPT',   badge:'b-ppt',   type:'office' },
  // Images
  jpg:  { label:'JPG',  badge:'b-img', type:'image' },
  jpeg: { label:'JPG',  badge:'b-img', type:'image' },
  png:  { label:'PNG',  badge:'b-img', type:'image' },
  gif:  { label:'GIF',  badge:'b-img', type:'image' },
  webp: { label:'WebP', badge:'b-img', type:'image' },
  svg:  { label:'SVG',  badge:'b-img', type:'image' },
  bmp:  { label:'BMP',  badge:'b-img', type:'image' },
  // PDF
  pdf:  { label:'PDF',  badge:'b-pdf', type:'pdf' },
  // Text
  txt:  { label:'TXT',  badge:'b-txt', type:'text' },
  csv:  { label:'CSV',  badge:'b-txt', type:'text' },
  md:   { label:'MD',   badge:'b-txt', type:'text' },
  json: { label:'JSON', badge:'b-txt', type:'text' },
};

function ext(name) { return name.split('.').pop().toLowerCase(); }

function getCtx() {
  const file = new URLSearchParams(location.search).get('file') || '';
  // legacy GitHub Pages support
  const h = location.hostname;
  const isGH = h.endsWith('.github.io');
  const owner = isGH ? h.replace('.github.io', '') : '';
  const parts = location.pathname.split('/').filter(Boolean);
  const repo = isGH && parts.length ? parts[0] : '';
  return { owner, repo, file };
}

function showState(icon, msg, sub, retryFn) {
  let el = document.getElementById('stateEl');
  if (!el) {
    el = document.createElement('div');
    el.className = 'state'; el.id = 'stateEl';
    document.getElementById('viewer').appendChild(el);
  }
  el.innerHTML = `
    <div class="state-icon">${icon}</div>
    <div class="state-msg">${msg}</div>
    ${sub ? `<div class="state-sub">${sub}</div>` : ''}
    ${retryFn ? `<button class="state-retry" id="retryBtn">重试</button>` : ''}
  `;
  if (retryFn) document.getElementById('retryBtn').addEventListener('click', retryFn);
}

function clearState() {
  const el = document.getElementById('stateEl');
  if (el) el.remove();
}

function init() {
  const { owner, repo, file } = getCtx();
  const base = owner && repo ? `https://${owner}.github.io/${repo}` : '';

  document.getElementById('homeLink').href = '/';
  document.getElementById('upLink').href = '/upload.html';

  // Support ?url= (external, e.g. catbox.moe) or ?file= (GitHub repo path)
  const urlParam = new URLSearchParams(location.search).get('url');

  if (!file && !urlParam) {
    showState('&#10060;', '缺少文件参数', '请通过正确的分享链接访问');
    return;
  }

  // Resolve actual URLs
  let rawUrl, pagesUrl, displayName;

  if (urlParam) {
    // External URL (catbox.moe, etc.)
    rawUrl = urlParam;
    pagesUrl = urlParam;
    displayName = urlParam.split('/').pop().split('?')[0];
  } else {
    // GitHub Pages path
    const filename = file.split('/').pop();
    displayName = filename.replace(/^\d+_/, '');
    rawUrl = owner && repo
      ? `https://raw.githubusercontent.com/${owner}/${repo}/main/${file}`
      : file;
    pagesUrl = owner && repo
      ? `https://${owner}.github.io/${repo}/${file}`
      : file;
  }

  const e = ext(displayName);
  const info = EXT_MAP[e];

  document.getElementById('barName').textContent = displayName;
  document.title = displayName + ' - FileShare';

  const badge = document.getElementById('barBadge');
  if (info) { badge.textContent = info.label; badge.className = 'badge ' + info.badge; }

  const dlBtn = document.getElementById('dlBtn');
  dlBtn.href = rawUrl;
  dlBtn.setAttribute('download', displayName);

  if (!info) {
    showState('&#128202;', '暂不支持预览', '请点击上方下载按钮获取文件');
    return;
  }

  switch (info.type) {
    case 'html':
      loadIframe(pagesUrl, true);
      break;
    case 'office':
      loadIframe('https://view.officeapps.live.com/op/embed.aspx?src=' + encodeURIComponent(rawUrl), false);
      break;
    case 'pdf':
      loadIframe(rawUrl, true);
      break;
    case 'image':
      showImage(rawUrl, displayName);
      break;
    case 'text':
      loadText(rawUrl);
      break;
  }
}

function loadIframe(src, waitLoad) {
  const iframe = document.createElement('iframe');
  iframe.src = src;
  iframe.setAttribute('allowfullscreen', '');
  if (waitLoad) {
    iframe.addEventListener('load', () => clearState());
    iframe.addEventListener('error', () =>
      showState('&#10060;', '加载失败', '文件可能尚未部署完成，请等待 1~3 分钟后重试', () => location.reload())
    );
  } else {
    setTimeout(() => clearState(), 2500);
  }
  document.getElementById('viewer').appendChild(iframe);
}

function showImage(url, alt) {
  const wrap = document.createElement('div');
  wrap.className = 'img-wrap';
  const img = document.createElement('img');
  img.alt = alt;
  img.onload = () => clearState();
  img.onerror = () => showState('&#10060;', '图片加载失败', '文件可能尚未部署完成，请稍后重试', () => location.reload());
  img.src = url;
  wrap.appendChild(img);
  document.getElementById('viewer').appendChild(wrap);
}

async function loadText(url) {
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const wrap = document.createElement('div');
    wrap.className = 'text-wrap';
    const inner = document.createElement('div');
    inner.className = 'text-inner';
    const pre = document.createElement('pre');
    pre.textContent = text;
    inner.appendChild(pre);
    wrap.appendChild(inner);
    document.getElementById('viewer').appendChild(wrap);
    clearState();
  } catch (e) {
    showState('&#10060;', '加载失败', '文件可能尚未部署完成，请稍后重试', () => location.reload());
  }
}

init();
</script>
</body>
</html>
