<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileShare</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-h: #4338CA;
      --bg: #F3F4F6;
      --card: #FFFFFF;
      --border: #E5E7EB;
      --text: #111827;
      --muted: #6B7280;
      --green: #10B981;
      --red: #EF4444;
      --r: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 28px 16px 60px;
    }
    .wrap { max-width: 640px; margin: 0 auto; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
    .logo span { color: var(--primary); }
    .hdr-btns { display: flex; gap: 8px; }
    .btn-icon {
      height: 38px; padding: 0 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--card); cursor: pointer;
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 5px;
      text-decoration: none; color: var(--text);
      transition: border-color .15s, color .15s;
    }
    .btn-icon:hover { border-color: var(--primary); color: var(--primary); }

    .card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--r); padding: 24px; margin-bottom: 16px;
    }
    .sec-label {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
    }

    /* Dropzone */
    .dropzone {
      border: 2px dashed var(--border); border-radius: var(--r); padding: 36px 20px;
      text-align: center; cursor: default;
      transition: border-color .2s, background .2s;
    }
    .dropzone.over { border-color: var(--primary); background: #EEF2FF; border-style: solid; }
    .dz-icon { font-size: 44px; margin-bottom: 10px; }
    .dz-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .dz-hint { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .dz-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .dz-btn {
      padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .dz-btn-primary { background: var(--primary); color: #fff; border: none; transition: background .15s; }
    .dz-btn-primary:hover { background: var(--primary-h); }
    .dz-btn-secondary { background: #fff; color: var(--text); border: 1.5px solid var(--border); transition: all .15s; }
    .dz-btn-secondary:hover { border-color: var(--primary); color: var(--primary); }

    /* Toolbar */
    .toolbar { display: none; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .toolbar.show { display: flex; }
    .toolbar-info { font-size: 13px; color: var(--muted); flex: 1; }
    .toolbar-info strong { color: var(--text); }
    .tbtn {
      padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border); background: #fff; color: var(--text);
      transition: all .15s; white-space: nowrap;
    }
    .tbtn:hover { border-color: var(--primary); color: var(--primary); }
    .tbtn.danger:hover { border-color: var(--red); color: var(--red); }

    /* File list */
    .file-list { display: flex; flex-direction: column; gap: 7px; margin-top: 12px; }
    .file-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: #F9FAFB; border: 1.5px solid var(--border); border-radius: 8px;
      transition: border-color .2s;
    }
    .file-item.uploading { border-color: var(--primary); background: #EEF2FF; }
    .file-item.done { border-color: #6EE7B7; background: #F0FDF4; }
    .file-item.error { border-color: #FCA5A5; background: #FEF2F2; }
    .fi-icon { font-size: 20px; flex-shrink: 0; }
    .fi-info { flex: 1; min-width: 0; }
    .fi-path { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fi-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fi-meta { display: flex; align-items: center; gap: 6px; margin-top: 1px; }
    .fi-size { font-size: 11px; color: var(--muted); }
    .fi-status { font-size: 11px; font-weight: 600; }
    .fi-status.uploading { color: var(--primary); }
    .fi-status.done { color: #059669; }
    .fi-status.error { color: var(--red); }
    .fi-link { font-size: 11px; color: var(--primary); text-decoration: none; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fi-link:hover { text-decoration: underline; }
    .fi-actions { display: flex; gap: 5px; flex-shrink: 0; }
    .fi-cp {
      padding: 3px 9px; background: #059669; color: #fff; border: none;
      border-radius: 5px; font-size: 11px; font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .fi-cp:hover { background: #047857; }
    .fi-rm { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 2px 3px; transition: color .15s; }
    .fi-rm:hover { color: var(--red); }

    .btn-upload {
      display: none; width: 100%; padding: 12px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px;
      transition: background .15s;
    }
    .btn-upload.show { display: block; }
    .btn-upload:hover { background: var(--primary-h); }
    .btn-upload:disabled { opacity: .55; cursor: not-allowed; }

    .prog { display: none; margin-top: 12px; }
    .prog.show { display: block; }
    .prog-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--primary); width: 0%; transition: width .3s ease; border-radius: 3px; }
    .prog-label { font-size: 12px; color: var(--muted); margin-top: 5px; }

    .btn-cp {
      padding: 8px 14px; background: #059669; color: #fff;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 12px; font-weight: 600; white-space: nowrap; transition: background .15s;
    }
    .btn-cp:hover { background: #047857; }

    /* History */
    .hist-list { list-style: none; }
    .hist-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .hist-item:last-child { border-bottom: none; }
    .hist-icon { font-size: 18px; flex-shrink: 0; }
    .hist-info { flex: 1; min-width: 0; }
    .hist-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-meta { font-size: 11px; color: var(--muted); }
    .hist-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-sm {
      padding: 5px 10px; border: 1.5px solid var(--border);
      border-radius: 6px; background: var(--card);
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: border-color .15s, color .15s;
      text-decoration: none; color: var(--text);
    }
    .btn-sm:hover { border-color: var(--primary); color: var(--primary); }

    .empty { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 10px 22px; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      background: var(--text); color: #fff;
      transition: transform .25s; z-index: 999; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok { background: var(--green); }
    .toast.err { background: var(--red); }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">File<span>Share</span></div>
    <div class="hdr-btns">
      <a class="btn-icon" href="admin.html">&#128202; 管理</a>
      <a class="btn-icon" href="upload.html">&#127760; 分享上传页</a>
    </div>
  </header>

  <!-- Upload -->
  <div class="card" id="uploadCard">
    <div class="dropzone" id="dz">
      <div class="dz-icon">&#128193;</div>
      <div class="dz-title">拖放文件或文件夹到此处</div>
      <div class="dz-hint">支持多文件同时上传 &middot; 支持文件夹 &middot; 最大 200MB</div>
      <div class="dz-actions">
        <button class="dz-btn dz-btn-primary" id="pickFilesBtn">&#128196; 选择文件</button>
        <button class="dz-btn dz-btn-secondary" id="pickFolderBtn">&#128193; 选择文件夹</button>
      </div>
    </div>
    <input type="file" id="fileIn" multiple style="display:none">
    <input type="file" id="folderIn" webkitdirectory style="display:none">

    <div class="toolbar" id="toolbar">
      <span class="toolbar-info" id="toolbarInfo"></span>
      <button class="tbtn" id="addFilesBtn">+ 文件</button>
      <button class="tbtn" id="addFolderBtn">+ 文件夹</button>
      <button class="tbtn danger" id="clearBtn">清空</button>
    </div>

    <div class="file-list" id="fileList"></div>

    <button class="btn-upload" id="upBtn">上传文件</button>
    <div class="prog" id="prog">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-label" id="progLabel"></div>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="sec-label">上传历史（本设备）</div>
    <ul class="hist-list" id="histList"></ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER   = 'https://fileshare-r2.guoyingwei6.workers.dev';
const ADMIN_KEY = '594gyw';
const MAX_SIZE  = 200 * 1024 * 1024;

const ICONS = {
  html:'&#127758;', htm:'&#127758;',
  doc:'&#128196;', docx:'&#128196;',
  xls:'&#128202;', xlsx:'&#128202;',
  ppt:'&#127909;', pptx:'&#127909;',
  pdf:'&#128211;',
  jpg:'&#128247;', jpeg:'&#128247;', png:'&#128247;',
  gif:'&#128247;', webp:'&#128247;', svg:'&#128247;', bmp:'&#128247;',
  txt:'&#128203;', csv:'&#128203;', md:'&#128203;', json:'&#128203;',
  zip:'&#128230;', gz:'&#128230;', rar:'&#128230;',
  mp4:'&#127916;', mov:'&#127916;', mp3:'&#127925;',
};

function ext(name) { return name.split('.').pop().toLowerCase(); }
function icon(name) { return ICONS[ext(name)] || '&#128196;'; }
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function viewUrl(u) { return location.origin + '/view.html?url=' + encodeURIComponent(u); }

// ── Queue ──
// item: { file, path, id, status, folderKey?, filePath?, url?, error? }
let queue = [], uploading = false, idSeq = 0;
// folderGroups: { [folderKey]: { name, ids: Set } }
const folderGroups = {};

function addFiles(files) {
  for (const f of files) {
    if (f.size > MAX_SIZE) { toast(`"${f.name}" 超过 200MB，已跳过`, 'err'); continue; }
    const id = ++idSeq;
    queue.push({ file: f, path: f.name, id, status: 'pending' });
    renderItem(queue[queue.length - 1]);
  }
  updateToolbar();
}

function addFolderFiles(files, folderKey, folderName) {
  if (!folderGroups[folderKey]) {
    folderGroups[folderKey] = { name: folderName, ids: new Set() };
    renderFolderHeader(folderKey, folderName, files.length);
  }
  for (const { file, filePath } of files) {
    if (file.size > MAX_SIZE) { toast(`"${file.name}" 超过 200MB，已跳过`, 'err'); continue; }
    const id = ++idSeq;
    folderGroups[folderKey].ids.add(id);
    queue.push({ file, path: filePath, id, status: 'pending', folderKey, filePath });
    renderItem(queue[queue.length - 1], true);
  }
  updateToolbar();
}

async function readDirEntry(entry, prefix = '') {
  const results = [];
  if (entry.isFile) {
    const file = await new Promise(res => entry.file(res));
    results.push({ file, filePath: prefix + file.name });
  } else if (entry.isDirectory) {
    const reader = entry.createReader();
    let batch, entries = [];
    do { batch = await new Promise((res, rej) => reader.readEntries(res, rej)); entries.push(...batch); } while (batch.length);
    for (const child of entries) results.push(...await readDirEntry(child, prefix + entry.name + '/'));
  }
  return results;
}

async function addFromDataTransfer(dt) {
  const items = [...dt.items].filter(i => i.kind === 'file');
  const entries = items.map(i => i.webkitGetAsEntry?.()).filter(Boolean);
  if (!entries.length) { addFiles([...dt.files]); return; }

  for (const entry of entries) {
    if (entry.isDirectory) {
      const folderKey = `${Date.now()}_${entry.name}`;
      const files = await readDirEntry(entry);
      addFolderFiles(files, folderKey, entry.name);
    } else {
      const file = await new Promise(res => entry.file(res));
      addFiles([file]);
    }
  }
}

// ── Render ──
function renderFolderHeader(folderKey, folderName, count) {
  const el = document.createElement('div');
  el.id = 'fh-' + folderKey;
  el.style.cssText = 'padding:10px 12px;background:#EEF2FF;border:1.5px solid #C7D2FE;border-radius:8px;margin-bottom:4px;';
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:20px">&#128193;</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;color:#4338CA;">${folderName}</div>
        <div style="font-size:11px;color:#6B7280;">${count} 个文件</div>
      </div>
      <div id="fha-${folderKey}"></div>
    </div>`;
  document.getElementById('fileList').appendChild(el);
}

function updateFolderStatus(folderKey) {
  const group = folderGroups[folderKey];
  if (!group) return;
  const items = queue.filter(i => i.folderKey === folderKey);
  const done = items.filter(i => i.status === 'done').length;
  const total = items.length;
  if (done < total) return; // not all done yet
  const folderUrl = location.origin + '/folder.html?key=' + encodeURIComponent(folderKey);
  const ac = document.getElementById('fha-' + folderKey);
  if (ac) ac.innerHTML = `<button style="padding:4px 10px;background:#4F46E5;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;" onclick="copyLink('${folderUrl}')">复制文件夹链接</button>
    <a href="${folderUrl}" target="_blank" style="margin-left:6px;font-size:11px;color:#4338CA;text-decoration:underline;">查看</a>`;
}

function renderItem(item, inFolder = false) {
  const el = document.createElement('div');
  el.className = 'file-item'; el.id = 'fi-' + item.id;
  if (inFolder) el.style.marginLeft = '16px';
  const dir = !inFolder && item.path.includes('/') ? item.path.slice(0, item.path.lastIndexOf('/') + 1) : '';
  const displayPath = inFolder ? item.filePath : '';
  el.innerHTML = `
    <span class="fi-icon">${icon(item.file.name)}</span>
    <div class="fi-info">
      ${displayPath && displayPath.includes('/') ? `<div class="fi-path">${displayPath.slice(0, displayPath.lastIndexOf('/') + 1)}</div>` : ''}
      <div class="fi-name">${item.file.name}</div>
      <div class="fi-meta"><span class="fi-size">${fmtSize(item.file.size)}</span><span class="fi-status" id="fis-${item.id}"></span></div>
      <div id="fil-${item.id}"></div>
    </div>
    <div class="fi-actions" id="fia-${item.id}">
      ${item.folderKey ? '' : `<button class="fi-rm" onclick="removeItem(${item.id})">&#10005;</button>`}
    </div>`;
  document.getElementById('fileList').appendChild(el);
}

function updateItemStatus(item) {
  const el = document.getElementById('fi-' + item.id); if (!el) return;
  el.className = 'file-item ' + (item.status === 'pending' ? '' : item.status);
  const st = document.getElementById('fis-' + item.id);
  const lk = document.getElementById('fil-' + item.id);
  const ac = document.getElementById('fia-' + item.id);
  if (item.status === 'uploading') {
    st.className = 'fi-status uploading'; st.textContent = '上传中...';
    lk.innerHTML = ''; if (ac) ac.innerHTML = '';
  } else if (item.status === 'done') {
    st.className = 'fi-status done'; st.textContent = '✓ 完成';
    if (!item.folderKey) {
      const vUrl = viewUrl(item.url);
      lk.innerHTML = `<a class="fi-link" href="${vUrl}" target="_blank">${vUrl}</a>`;
      if (ac) ac.innerHTML = `<button class="fi-cp" onclick="copyLink('${vUrl}')">复制</button>`;
    } else {
      lk.innerHTML = '';
      updateFolderStatus(item.folderKey);
    }
  } else if (item.status === 'error') {
    st.className = 'fi-status error'; st.textContent = '✕ ' + (item.error || '失败');
    if (ac) ac.innerHTML = `<button class="fi-rm" onclick="removeItem(${item.id})">&#10005;</button>`;
  }
}

function removeItem(id) {
  queue = queue.filter(i => i.id !== id);
  document.getElementById('fi-' + id)?.remove();
  updateToolbar();
}

function updateToolbar() {
  const pending = queue.filter(i => i.status === 'pending');
  const toolbar = document.getElementById('toolbar');
  const upBtn = document.getElementById('upBtn');
  if (!queue.length) { toolbar.classList.remove('show'); upBtn.classList.remove('show'); return; }
  toolbar.classList.add('show');
  const totalSize = queue.reduce((s, i) => s + i.file.size, 0);
  document.getElementById('toolbarInfo').innerHTML = `已选 <strong>${queue.length}</strong> 个文件，共 <strong>${fmtSize(totalSize)}</strong>`;
  upBtn.classList.toggle('show', pending.length > 0 && !uploading);
  upBtn.textContent = `上传 ${pending.length} 个文件`;
}

// ── Upload ──
async function uploadAll() {
  const pending = queue.filter(i => i.status === 'pending');
  if (!pending.length) return;
  uploading = true;
  document.getElementById('upBtn').disabled = true;
  document.getElementById('upBtn').classList.remove('show');
  const prog = document.getElementById('prog'); prog.classList.add('show');
  const fill = document.getElementById('progFill');
  const label = document.getElementById('progLabel');
  fill.style.width = '0%';
  let done = 0;
  for (const item of pending) {
    label.textContent = `正在上传 ${done + 1} / ${pending.length}：${item.file.name}`;
    item.status = 'uploading'; updateItemStatus(item);
    try {
      const fd = new FormData();
      fd.append('file', item.file);
      fd.append('adminKey', ADMIN_KEY);
      if (item.folderKey) {
        fd.append('folderKey', item.folderKey);
        fd.append('filePath', item.filePath);
      }
      const resp = await fetch(WORKER + '/upload', { method: 'POST', body: fd });
      if (!resp.ok) { const e = await resp.json(); throw new Error(e.error || `HTTP ${resp.status}`); }
      const { url } = await resp.json();
      item.status = 'done'; item.url = url;
      if (!item.folderKey) {
        const vUrl = viewUrl(url);
        saveHist({ name: item.file.name, url: vUrl, size: item.file.size, date: new Date().toISOString() });
      }
    } catch (e) { item.status = 'error'; item.error = e.message; }
    updateItemStatus(item);
    fill.style.width = (++done / pending.length * 100) + '%';
  }
  // Save folder links to history
  for (const [fk, group] of Object.entries(folderGroups)) {
    const items = queue.filter(i => i.folderKey === fk && i.status === 'done');
    if (items.length > 0) {
      const folderUrl = location.origin + '/folder.html?key=' + encodeURIComponent(fk);
      saveHist({ name: '&#128193; ' + group.name, url: folderUrl, size: items.reduce((s,i)=>s+i.file.size,0), date: new Date().toISOString(), isFolder: true });
    }
  }
  renderHist();
  const ok = pending.filter(i => i.status === 'done').length;
  toast(ok === pending.length ? `全部上传成功！共 ${ok} 个文件` : `完成：${ok} 成功，${pending.length - ok} 失败`, ok === pending.length ? 'ok' : '');
  uploading = false;
  setTimeout(() => { prog.classList.remove('show'); fill.style.width = '0%'; }, 1500);
  updateToolbar();
}

function copyLink(url) { navigator.clipboard.writeText(url).then(() => toast('链接已复制', 'ok')); }

// ── Events ──
document.getElementById('pickFilesBtn').onclick = e => { e.stopPropagation(); document.getElementById('fileIn').click(); };
document.getElementById('pickFolderBtn').onclick = e => { e.stopPropagation(); document.getElementById('folderIn').click(); };
document.getElementById('addFilesBtn').onclick = () => document.getElementById('fileIn').click();
document.getElementById('addFolderBtn').onclick = () => document.getElementById('folderIn').click();
document.getElementById('fileIn').onchange = e => { addFiles([...e.target.files]); e.target.value = ''; };
document.getElementById('folderIn').onchange = e => {
  const files = [...e.target.files];
  if (!files.length) return;
  const rootName = files[0].webkitRelativePath.split('/')[0];
  const folderKey = `${Date.now()}_${rootName}`;
  const mapped = files.map(f => ({ file: f, filePath: f.webkitRelativePath.slice(rootName.length + 1) }));
  addFolderFiles(mapped, folderKey, rootName);
  e.target.value = '';
};
document.getElementById('clearBtn').onclick = () => { queue = []; document.getElementById('fileList').innerHTML = ''; updateToolbar(); };
document.getElementById('upBtn').onclick = uploadAll;

const dz = document.getElementById('dz');
const card = document.getElementById('uploadCard');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', e => { if (!dz.contains(e.relatedTarget)) dz.classList.remove('over'); });
dz.addEventListener('drop', async e => { e.preventDefault(); dz.classList.remove('over'); await addFromDataTransfer(e.dataTransfer); });
card.addEventListener('dragover', e => e.preventDefault());
card.addEventListener('drop', async e => { e.preventDefault(); await addFromDataTransfer(e.dataTransfer); });

// ── History ──
function loadHist() { try { return JSON.parse(localStorage.fs_hist || '[]'); } catch { return []; } }
function saveHist(item) {
  const h = loadHist(); h.unshift(item);
  if (h.length > 200) h.splice(200);
  localStorage.fs_hist = JSON.stringify(h);
}
function renderHist() {
  const h = loadHist();
  const ul = document.getElementById('histList');
  if (!h.length) { ul.innerHTML = '<li class="empty">暂无上传记录</li>'; return; }
  ul.innerHTML = h.map(it => {
    const dt = new Date(it.date).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    return `<li class="hist-item">
      <span class="hist-icon">${icon(it.name)}</span>
      <div class="hist-info">
        <div class="hist-name" title="${it.name}">${it.name}</div>
        <div class="hist-meta">${dt} &middot; ${fmtSize(it.size)}</div>
      </div>
      <div class="hist-btns">
        <button class="btn-sm" onclick="navigator.clipboard.writeText('${it.url}').then(()=>toast('已复制','ok'))">复制</button>
        <a class="btn-sm" href="${it.url}" target="_blank">查看</a>
      </div>
    </li>`;
  }).join('');
}

// ── Toast ──
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

renderHist();
</script>
</body>
</html>
